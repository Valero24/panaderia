services:
  postgres:
    image: postgres:16-alpine
    container_name: cartagena-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cartagena_db}
      POSTGRES_USER: ${POSTGRES_USER:-cartagena_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cartagena_user} -d ${POSTGRES_DB:-cartagena_db}"]
      interval: 10s
      timeout: 5s
      retries: 8
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cartagena-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./env/backend.staging.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cartagena_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cartagena_db}?schema=public
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_ENABLE_REAL_AVAILABILITY: ${NEXT_PUBLIC_ENABLE_REAL_AVAILABILITY:-false}
        NEXT_PUBLIC_ENABLE_REAL_PAYMENTS: ${NEXT_PUBLIC_ENABLE_REAL_PAYMENTS:-false}
    container_name: cartagena-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_ENABLE_REAL_AVAILABILITY: ${NEXT_PUBLIC_ENABLE_REAL_AVAILABILITY:-false}
      NEXT_PUBLIC_ENABLE_REAL_PAYMENTS: ${NEXT_PUBLIC_ENABLE_REAL_PAYMENTS:-false}
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  backend_uploads:
